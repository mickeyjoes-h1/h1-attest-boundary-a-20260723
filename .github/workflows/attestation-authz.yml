name: attestation-repository-authz-probe

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Positive control in token repository
        id: positive
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6
        with:
          subject-name: h1-attestation-positive-control
          subject-digest: sha256:1111111111111111111111111111111111111111111111111111111111111111

      - name: Fetch the same pinned action bundle
        shell: bash
        run: |
          mkdir -p "$RUNNER_TEMP/attest-dist"
          for file in index.js 50.index.js 606.index.js package.json; do
            curl --fail --silent --show-error --location \
              "https://raw.githubusercontent.com/actions/attest/f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6/dist/$file" \
              --output "$RUNNER_TEMP/attest-dist/$file"
          done

      - name: Attempt attestation write to foreign repository context
        id: foreign
        continue-on-error: true
        env:
          ACTION_TOKEN: ${{ github.token }}
          ATTEST_BUNDLE_PATH: ${{ runner.temp }}/attest-dist/index.js
        shell: bash
        run: node direct-attest.js

      - name: Assert repository authorization
        env:
          POSITIVE_OUTCOME: ${{ steps.positive.outcome }}
          FOREIGN_OUTCOME: ${{ steps.foreign.outcome }}
        shell: bash
        run: |
          echo "positive_outcome=$POSITIVE_OUTCOME"
          echo "foreign_outcome=$FOREIGN_OUTCOME"
          test "$POSITIVE_OUTCOME" = "success"
          test "$FOREIGN_OUTCOME" = "failure"
          echo "attestation_repository_scope=pass"
